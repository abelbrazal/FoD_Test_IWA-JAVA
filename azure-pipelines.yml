# FoD DAST Scan Pipeline using FCLI
# FCLI_VERSION is prompted at queue time. Accept the default or type any
# release tag from https://github.com/fortify/fcli/releases
#
# Prerequisites:
#   1. Create the following pipeline secret variables in ADO:
#      - FOD_CLIENT_ID     : FoD OAuth client ID
#      - FOD_CLIENT_SECRET : FoD OAuth client secret
#   2. Ensure the target release already has a DAST scan configuration in FoD.
#
# Required pipeline variables (non-secret, set in ADO Pipeline > Variables):
#   - FOD_URL        : FoD API URL (e.g. https://api.ams.fortify.com)
#   - FOD_RELEASE_ID : FoD release ID (numeric, e.g. 1775747) — mark as settable at queue time

parameters:
  - name: fcliVersion
    displayName: 'FCLI version to install'
    type: string
    default: '3.16.0'   # Change to any tag from https://github.com/fortify/fcli/releases
  - name: releaseId
    displayName: 'FoD Release ID (numeric)'
    type: string
    default: ''

trigger:
  - none   # Run manually or adjust to your branch strategy

pool:
  vmImage: windows-latest

variables:
  FCLI_VERSION: ${{ parameters.fcliVersion }}
  FOD_URL: 'https://api.ams.fortify.com'
  FOD_RELEASE_ID: ${{ parameters.releaseId }}

stages:
  - stage: FoDDASTScan
    displayName: 'FoD DAST Scan'
    jobs:
      - job: RunDASTScan
        displayName: 'Run FoD DAST Scan via FCLI'
        timeoutInMinutes: 480  # DAST scans can be long-running; adjust as needed
        steps:

          # ------------------------------------------------------------------
          # Step 1 – Install FCLI
          # ------------------------------------------------------------------
          - task: PowerShell@2
            displayName: 'Install FCLI'
            inputs:
              targetType: inline
              script: |
                $version    = "$(FCLI_VERSION)"
                $downloadUrl = "https://github.com/fortify/fcli/releases/download/v${version}/fcli-windows.zip"
                $zipPath     = "$(Agent.TempDirectory)\fcli.zip"
                $installDir  = "$(Agent.ToolsDirectory)\fcli"

                Write-Host "Downloading FCLI v$version from $downloadUrl"
                Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath -UseBasicParsing

                Write-Host "Extracting FCLI to $installDir"
                Expand-Archive -Path $zipPath -DestinationPath $installDir -Force

                # Prepend the install directory to PATH for all subsequent steps
                Write-Host "##vso[task.prependpath]$installDir"
                Write-Host "FCLI installed successfully."

          # ------------------------------------------------------------------
          # Step 2 – Verify FCLI version
          # ------------------------------------------------------------------
          - task: PowerShell@2
            displayName: 'Verify FCLI installation'
            inputs:
              targetType: inline
              script: fcli --version

          # ------------------------------------------------------------------
          # Step 3a – Verify credentials variables are populated
          # Prints the length of each secret so you can confirm they are set
          # without exposing the values in the log.
          # ------------------------------------------------------------------
          - task: PowerShell@2
            displayName: 'FoD – Verify credential variables'
            env:
              FOD_CLIENT_ID:     $(FOD_CLIENT_ID)
              FOD_CLIENT_SECRET: $(FOD_CLIENT_SECRET)
            inputs:
              targetType: inline
              script: |
                $idLen     = $env:FOD_CLIENT_ID.Length
                $secretLen = $env:FOD_CLIENT_SECRET.Length

                Write-Host "FOD_CLIENT_ID length     : $idLen"
                Write-Host "FOD_CLIENT_SECRET length : $secretLen"

                if ($idLen -eq 0 -or $secretLen -eq 0) {
                  Write-Error "One or more credential variables are empty. Ensure FOD_CLIENT_ID and FOD_CLIENT_SECRET are defined as secret pipeline variables (Pipeline > Variables > padlock icon) and are not inside a variable group that is unlinked."
                  exit 1
                }

                # Warn if values look like they were stored with surrounding quotes
                if ($env:FOD_CLIENT_ID.StartsWith('"') -or $env:FOD_CLIENT_ID.StartsWith("'")) {
                  Write-Warning "FOD_CLIENT_ID appears to start with a quote character - remove surrounding quotes from the variable value."
                }
                if ($env:FOD_CLIENT_SECRET.StartsWith('"') -or $env:FOD_CLIENT_SECRET.StartsWith("'")) {
                  Write-Warning "FOD_CLIENT_SECRET appears to start with a quote character - remove surrounding quotes from the variable value."
                }

                Write-Host "Credential variables are populated."

          # ------------------------------------------------------------------
          # Step 3b – Log in to FoD
          # Uses OAuth client credentials. Mark FOD_CLIENT_ID and
          # FOD_CLIENT_SECRET as secret in ADO
          # (Pipeline > Variables > padlock icon).
          # ------------------------------------------------------------------
          - task: PowerShell@2
            displayName: 'FoD – Login'
            env:
              FOD_CLIENT_ID:     $(FOD_CLIENT_ID)
              FOD_CLIENT_SECRET: $(FOD_CLIENT_SECRET)
            inputs:
              targetType: inline
              script: |
                fcli fod session login `
                  "--url=$(FOD_URL)" `
                  "--client-id=$env:FOD_CLIENT_ID" `
                  "--client-secret=$env:FOD_CLIENT_SECRET"

                if ($LASTEXITCODE -ne 0) {
                  Write-Error "FoD login failed (fcli exit code $LASTEXITCODE). Check FOD_CLIENT_ID, FOD_CLIENT_SECRET, and FOD_URL."
                  exit $LASTEXITCODE
                }
                Write-Host "FoD login successful."

          # ------------------------------------------------------------------
          # Step 4 – Start the DAST scan and wait for completion
          # The release must already have a DAST scan configuration in FoD.
          # Remove '--wait' if you prefer a fire-and-forget trigger.
          # ------------------------------------------------------------------
          - task: PowerShell@2
            displayName: 'FoD – Start & wait for DAST scan'
            inputs:
              targetType: inline
              script: |
                fcli fod dast-scan start `
                  "--release=$(FOD_RELEASE_ID)" `
                  "--wait-interval=30"

                if ($LASTEXITCODE -ne 0) {
                  Write-Error "DAST scan failed or was not started (fcli exit code $LASTEXITCODE)."
                  exit $LASTEXITCODE
                }
                Write-Host "DAST scan completed successfully."
              # failOnStderr defaults to false so FCLI informational output
              # does not incorrectly fail the step.
              failOnStderr: false

          # # ------------------------------------------------------------------
          # # Step 5 – Export scan summary (optional – writes JSON to artifacts)
          # # ------------------------------------------------------------------
          # - task: PowerShell@2
          #   displayName: 'FoD – Export scan summary'
          #   inputs:
          #     targetType: inline
          #     script: |
          #       $outDir = "$(Build.ArtifactStagingDirectory)\fod-dast"
          #       New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          #       fcli fod dast-scan list `
          #         --release $(FOD_RELEASE_ID) `
          #         --output json `
          #         | Out-File -FilePath "$outDir\dast-scan-summary.json" -Encoding utf8

          #       Write-Host "Scan summary saved to $outDir\dast-scan-summary.json"
          #   continueOnError: true   # Don't block the pipeline if export fails

          # # ------------------------------------------------------------------
          # # Step 6 – Log out of FoD (always runs, even if earlier steps fail)
          # # ------------------------------------------------------------------
          # - task: PowerShell@2
          #   displayName: 'FoD – Logout'
          #   condition: always()
          #   inputs:
          #     targetType: inline
          #     script: |
          #       fcli fod session logout
          #       Write-Host "FoD logout successful."

          # # ------------------------------------------------------------------
          # # Step 7 – Publish DAST scan summary as pipeline artifact
          # # ------------------------------------------------------------------
          # - task: PublishBuildArtifacts@1
          #   displayName: 'Publish FoD DAST scan artifacts'
          #   condition: always()
          #   inputs:
          #     PathtoPublish: '$(Build.ArtifactStagingDirectory)\fod-dast'
          #     ArtifactName:  'fod-dast-results'
          #     publishLocation: Container
